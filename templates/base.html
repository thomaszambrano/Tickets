<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tickets y Reservas{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        nav { background: #2c3e50; padding: 10px 20px; display: flex; gap: 15px; align-items: center; }
        nav a { color: white; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        nav button { background: transparent; border: 1px solid white; color: white; padding: 4px 10px; cursor: pointer; border-radius: 4px; }
        .messages { padding: 10px 20px; }
        .messages p { background: #d4edda; border: 1px solid #c3e6cb; padding: 8px 12px; border-radius: 4px; }
        main { padding: 20px; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'home' %}">Inicio</a>

        {% if user.is_authenticated %}
            <a href="{% url 'mis_reservas' %}">Mis reservas</a>

            {% if user.is_staff %}
                <a href="/admin/">Administración</a>
            {% endif %}

            <form method="post" action="{% url 'logout' %}" style="display:inline;">
                {% csrf_token %}
                <button type="submit">Cerrar sesión ({{ user.username }})</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Iniciar sesión</a>
        {% endif %}
    </nav>

    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p class="{{ message.tags }}">{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
